    - data:
        code: "\nimport json\n\ndef main(extracted_data: str):\n    # 解析输入的 JSON\n\
          \    try:\n        data = json.loads(extracted_data)\n    except:\n    \
          \    return {\"error\": \"解析用户数据失败\", \"total_score_sg\": 0, \"total_score_de\"\
          : 0}\n    \n    # ========== 新加坡项目评分 ==========\n    score_sg = 0\n    breakdown_sg\
          \ = {}\n    \n    # 1. 年龄/学段匹配 (0-18)\n    age = data.get(\"c_age\")\n \
          \   degree = data.get(\"c_degree\", \"\")\n    if age is not None:\n   \
          \     if 14 <= age <= 16 and \"初中\" in degree:\n            age_match =\
          \ 18\n        elif 16 <= age <= 19 and (\"高中\" in degree or \"中职\" in degree):\n\
          \            age_match = 16\n        elif age >= 17 and (\"职高\" in degree\
          \ or \"中专\" in degree or \"技校\" in degree):\n            age_match = 14\n\
          \        elif \"专科\" in degree:\n            age_match = 10\n        elif\
          \ \"本科\" in degree:\n            age_match = 8\n        else:\n        \
          \    age_match = 0\n    else:\n        age_match = 0\n    score_sg += age_match\n\
          \    breakdown_sg[\"age_match\"] = age_match\n    \n    # 2. 学历层次 (0-12)\n\
          \    if \"初中\" in degree:\n        edu_score = 8\n    elif \"高中\" in degree\
          \ or \"中职\" in degree:\n        edu_score = 10\n    elif \"专科\" in degree\
          \ or \"本科\" in degree:\n        edu_score = 12\n    else:\n        edu_score\
          \ = 0\n    score_sg += edu_score\n    breakdown_sg[\"education\"] = edu_score\n\
          \    \n    # 3. 升学需求 (0-15)\n    study_map = {\"strong\":15, \"medium\"\
          :10, \"weak\":5, \"none\":0}\n    study_score = study_map.get(data.get(\"\
          study_intent\", \"none\"), 0)\n    score_sg += study_score\n    breakdown_sg[\"\
          study_intent\"] = study_score\n    \n    # 4. 就业需求 (0-10)\n    job_map =\
          \ {\"strong\":10, \"medium\":7, \"weak\":4, \"none\":0}\n    job_score =\
          \ job_map.get(data.get(\"job_intent\", \"none\"), 0)\n    score_sg += job_score\n\
          \    breakdown_sg[\"job_intent\"] = job_score\n    \n    # 5. 家庭经济 (0-15)\n\
          \    income_map = {\"high\":15, \"medium\":12, \"low\":8, \"very_low\":4}\n\
          \    income_score = income_map.get(data.get(\"family_income\", \"very_low\"\
          ), 0)\n    score_sg += income_score\n    breakdown_sg[\"family_income\"\
          ] = income_score\n    \n    # 6. 入学能力（英语） (0-10)\n    english_map = {\"\
          fluent\":10, \"good\":7, \"basic\":4, \"poor\":0}\n    english_score = english_map.get(data.get(\"\
          english_level\", \"poor\"), 0)\n    score_sg += english_score\n    breakdown_sg[\"\
          english\"] = english_score\n    \n    # 7. 留学意愿 (0-12)\n    abroad_map =\
          \ {\"strong\":12, \"medium\":8, \"weak\":4, \"none\":0}\n    abroad_score\
          \ = abroad_map.get(data.get(\"study_abroad_intent\", \"none\"), 0)\n   \
          \ score_sg += abroad_score\n    breakdown_sg[\"study_abroad\"] = abroad_score\n\
          \    \n    # 8. 政策关注度 (0-8)\n    policy_map = {\"active\":8, \"passive\"\
          :4, \"none\":0}\n    policy_score = policy_map.get(data.get(\"policy_concern\"\
          , \"none\"), 0)\n    score_sg += policy_score\n    breakdown_sg[\"policy\"\
          ] = policy_score\n    \n    # 新加坡总分 (满分100)\n    total_sg = score_sg\n \
          \   \n    # ========== 德国项目评分 ==========\n    score_de = 0\n    breakdown_de\
          \ = {}\n    \n    # 1. 年龄 (0-15)\n    if age is not None:\n        if 18\
          \ <= age <= 25:\n            age_de = 15\n        elif 26 <= age <= 30:\n\
          \            age_de = 12\n        elif 31 <= age <= 35:\n            age_de\
          \ = 8\n        elif 36 <= age <= 40:\n            age_de = 3\n        else:\n\
          \            age_de = 0\n    else:\n        age_de = 0\n    score_de +=\
          \ age_de\n    breakdown_de[\"age\"] = age_de\n    \n    # 2. 学历 (0-10)\n\
          \    if \"本科\" in degree or \"硕士\" in degree:\n        edu_de = 10\n   \
          \ elif \"专科\" in degree or \"高职\" in degree:\n        edu_de = 8\n    elif\
          \ \"高中\" in degree or \"中职\" in degree:\n        edu_de = 6\n    else:\n\
          \        edu_de = 0\n    score_de += edu_de\n    breakdown_de[\"education\"\
          ] = edu_de\n    \n    # 3. 就业导向 (0-20)\n    job_de_map = {\"strong\":20,\
          \ \"medium\":14, \"weak\":8, \"none\":0}\n    job_de = job_de_map.get(data.get(\"\
          job_intent\", \"none\"), 0)\n    score_de += job_de\n    breakdown_de[\"\
          job_intent\"] = job_de\n    \n    # 4. 移民需求 (0-10)\n    imm_map = {\"strong\"\
          :10, \"medium\":6, \"weak\":3, \"none\":0}\n    imm_score = imm_map.get(data.get(\"\
          immigration_intent\", \"none\"), 0)\n    score_de += imm_score\n    breakdown_de[\"\
          immigration\"] = imm_score\n    \n    # 5. 升学需求 (0-5)\n    study_de_map\
          \ = {\"strong\":5, \"medium\":3, \"weak\":1, \"none\":0}\n    study_de =\
          \ study_de_map.get(data.get(\"study_intent\", \"none\"), 0)\n    score_de\
          \ += study_de\n    breakdown_de[\"study_intent\"] = study_de\n    \n   \
          \ # 6. 动手能力 (0-8)\n    hands_map = {\"strong\":8, \"medium\":5, \"weak\"\
          :2, \"none\":0}\n    hands_score = hands_map.get(data.get(\"hands_on_ability\"\
          , \"none\"), 0)\n    score_de += hands_score\n    breakdown_de[\"hands_on\"\
          ] = hands_score\n    \n    # 7. 逻辑思维 (0-5)\n    logic_map = {\"strong\"\
          :5, \"medium\":3, \"weak\":1, \"none\":0}\n    logic_score = logic_map.get(data.get(\"\
          logic_ability\", \"none\"), 0)\n    score_de += logic_score\n    breakdown_de[\"\
          logic\"] = logic_score\n    \n    # 8. 德语能力 (0-12)\n    german_map = {\"\
          b1+\":12, \"b1\":10, \"a2\":6, \"a1\":3, \"learning\":2, \"none\":0}\n \
          \   german_score = german_map.get(data.get(\"german_level\", \"none\"),\
          \ 0)\n    score_de += german_score\n    breakdown_de[\"german\"] = german_score\n\
          \    \n    # 9. 家庭支持 (0-5)\n    support_map = {\"strong\":5, \"medium\"\
          :3, \"weak\":1, \"none\":0}\n    support_score = support_map.get(data.get(\"\
          family_support\", \"none\"), 0)\n    score_de += support_score\n    breakdown_de[\"\
          family_support\"] = support_score\n    \n    # 10. 经济理性 (0-2)\n    rational_score\
          \ = 2 if data.get(\"economic_rational\") == \"true\" else 0\n    score_de\
          \ += rational_score\n    breakdown_de[\"economic_rational\"] = rational_score\n\
          \    \n    # 11. 留学意愿 (0-4)\n    abroad_de_map = {\"strong\":4, \"medium\"\
          :2, \"weak\":1, \"none\":0}\n    abroad_de = abroad_de_map.get(data.get(\"\
          study_abroad_intent\", \"none\"), 0)\n    score_de += abroad_de\n    breakdown_de[\"\
          study_abroad\"] = abroad_de\n    \n    # 12. 政策关注度 (0-3)\n    policy_de_map\
          \ = {\"active\":3, \"passive\":1.5, \"none\":0}\n    policy_de = policy_de_map.get(data.get(\"\
          policy_concern\", \"none\"), 0)\n    score_de += policy_de\n    breakdown_de[\"\
          policy\"] = policy_de\n    \n    # 13. 学习态度 (0-3)\n    attitude_map = {\"\
          strong\":3, \"medium\":1.5, \"weak\":0.5, \"none\":0}\n    attitude_score\
          \ = attitude_map.get(data.get(\"learning_attitude\", \"none\"), 0)\n   \
          \ score_de += attitude_score\n    breakdown_de[\"learning_attitude\"] =\
          \ attitude_score\n    \n    total_de = score_de\n    \n    # ==========\
          \ 等级评定（通用） ==========\n    def get_level(score):\n        if score >= 81:\
          \ return \"S\"\n        elif score >= 61: return \"A\"\n        elif score\
          \ >= 41: return \"B\"\n        elif score >= 21: return \"C\"\n        else:\
          \ return \"D\"\n    \n    level_sg = get_level(total_sg)\n    level_de =\
          \ get_level(total_de)\n    \n    # 返回结果，供下一个 LLM 节点使用\n    return {\n  \
          \      \"sg_score\": total_sg,\n        \"sg_level\": level_sg,\n      \
          \  \"sg_breakdown\": json.dumps(breakdown_sg),\n        \"de_score\": total_de,\n\
          \        \"de_level\": level_de,\n        \"de_breakdown\": json.dumps(breakdown_de),\n\
          \        \"user_name\": data.get(\"c_name\", \"未知\"),\n        \"user_phone\"\
          : str(data.get(\"c_phone\", \"\")),\n        \"user_age\": age,\n      \
          \  \"user_degree\": degree\n    }"
