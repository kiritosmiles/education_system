<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Education System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --jirai-black: #1a1a2e;
            --jirai-dark: #16213e;
            --jirai-purple: #533483;
            --jirai-pink: #e91e63;
            --jirai-soft-pink: #fce4ec;
            --jirai-lavender: #b39ddb;
        }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #533483 50%, #e91e63 100%); min-height: 100vh; display: flex; align-items: center; font-family: "Microsoft YaHei", sans-serif; }
        .login-card { max-width: 420px; margin: auto; border-radius: 20px; box-shadow: 0 15px 50px rgba(233,30,99,.3); border: 1px solid rgba(255,255,255,.1); overflow: hidden; }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #e91e63, #b39ddb, #533483); }
        .login-card .card-body { padding: 45px; position: relative; background: rgba(26,26,46,.95); backdrop-filter: blur(10px); }
        .login-card h3 { color: #fce4ec; font-weight: 700; }
        .login-card .text-muted { color: #b39ddb !important; }
        .login-card .form-label { color: #e1bee7; font-weight: 500; }
        .login-card .form-control { background: rgba(255,255,255,.08); border: 1px solid rgba(179,157,219,.3); color: #fce4ec; border-radius: 10px; }
        .login-card .form-control:focus { background: rgba(255,255,255,.12); border-color: #e91e63; box-shadow: 0 0 0 3px rgba(233,30,99,.2); color: #fce4ec; }
        .login-card .form-control::placeholder { color: rgba(179,157,219,.5); }
        .login-card .input-group-text { background: rgba(233,30,99,.15); border: 1px solid rgba(179,157,219,.3); color: #e91e63; border-radius: 10px 0 0 10px; }
        .btn-login { background: linear-gradient(135deg, #e91e63, #533483); border: none; padding: 12px; border-radius: 12px; font-weight: 600; font-size: 1rem; letter-spacing: 2px; transition: all .3s; }
        .btn-login:hover { background: linear-gradient(135deg, #c2185b, #4a2d74); transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233,30,99,.4); }
        .login-icon { background: linear-gradient(135deg, #e91e63, #533483); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .alert-danger { background: rgba(233,30,99,.15); border-color: rgba(233,30,99,.3); color: #f48fb1; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-mortarboard-fill login-icon" style="font-size:3rem"></i>
                    <h3 class="mt-2">Education System</h3>
                    <p class="text-muted">请登录您的账号</p>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" required minlength="5" maxlength="20" placeholder="请输入用户名">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="pwd" required minlength="6" maxlength="20" placeholder="请输入密码">
                        </div>
                    </div>
                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <button type="submit" class="btn btn-primary btn-login w-100">登 录</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const pwd = document.getElementById('pwd').value;
            const errorEl = document.getElementById('errorMsg');
            errorEl.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, pwd })
                });
                const data = await res.json();
                if (res.ok && data.code === 200) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data));
                    window.location.href = '/dashboard';
                } else {
                    errorEl.textContent = data.detail || data.msg || '登录失败';
                    errorEl.classList.remove('d-none');
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
