<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Education System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 400px; margin: auto; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
        .login-card .card-body { padding: 40px; }
        .login-card h3 { color: #2c3e50; }
        .btn-login { background: linear-gradient(135deg, #667eea, #764ba2); border: none; padding: 10px; }
        .btn-login:hover { background: linear-gradient(135deg, #5a6fd6, #6a4192); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="bi bi-mortarboard-fill" style="font-size:3rem;color:#667eea"></i>
                    <h3 class="mt-2">Education System</h3>
                    <p class="text-muted">请登录您的账号</p>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" required minlength="5" maxlength="20" placeholder="请输入用户名">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="pwd" required minlength="6" maxlength="20" placeholder="请输入密码">
                        </div>
                    </div>
                    <div id="errorMsg" class="alert alert-danger d-none"></div>
                    <button type="submit" class="btn btn-primary btn-login w-100">登 录</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const pwd = document.getElementById('pwd').value;
            const errorEl = document.getElementById('errorMsg');
            errorEl.classList.add('d-none');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, pwd })
                });
                const data = await res.json();
                if (res.ok && data.code === 200) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data));
                    window.location.href = '/dashboard';
                } else {
                    errorEl.textContent = data.detail || data.msg || '登录失败';
                    errorEl.classList.remove('d-none');
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
