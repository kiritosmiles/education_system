{% extends "base.html" %}
{% block title %}AI智能助手{% endblock %}
{% block content %}
<style>
    /* 让整条flex链高度约束生效，页面不出现整体滚动 */
    .container-fluid, .container-fluid > .row {
        height: 100vh;
        overflow: hidden;
    }
    .col-md-10.main-content {
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding-right: 0 !important;
    }
    #chatCard {
        flex: 1 1 0%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: rgba(15,12,41,.6);
    }
    #chatCard > .card-body {
        flex: 1 1 0%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    #chatContainer {
        flex: 1 1 0%;
        min-height: 0;
        overflow-y: auto;
    }
    #chatContainer::-webkit-scrollbar { width: 6px; }
    #chatContainer::-webkit-scrollbar-track { background: rgba(15,12,41,.3); border-radius: 3px; }
    #chatContainer::-webkit-scrollbar-thumb { background: rgba(233,30,99,.3); border-radius: 3px; }
    #chatContainer::-webkit-scrollbar-thumb:hover { background: rgba(233,30,99,.5); }

    /* ===== 表格横向滚动 + 样式美化 ===== */
    #chatContainer .ai-bubble-content .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid rgba(179,157,219,.2);
    }
    #chatContainer .ai-bubble-content table {
        border-collapse: collapse;
        width: 100%;
        margin: 0;
    }
    #chatContainer .ai-bubble-content table th {
        background: linear-gradient(135deg, #e91e63, #533483);
        color: #fff;
        font-weight: 600;
        padding: 8px 12px;
        font-size: 13px;
        border: 1px solid rgba(233,30,99,.3);
        white-space: nowrap;
    }
    #chatContainer .ai-bubble-content table td {
        padding: 6px 12px;
        font-size: 13px;
        border: 1px solid rgba(179,157,219,.15);
        white-space: pre-wrap;
        word-break: break-word;
        color: #ce93d8;
    }
    #chatContainer .ai-bubble-content table tr:nth-child(even) td {
        background: rgba(83,52,131,.1);
    }
    #chatContainer .ai-bubble-content table tr:hover td {
        background: rgba(233,30,99,.1);
    }

    /* ===== 代码块高亮+复制按钮 ===== */
    #chatContainer .ai-bubble-content pre {
        position: relative;
        background: #0f0c29;
        color: #f48fb1;
        border-radius: 8px;
        padding: 16px;
        overflow-x: auto;
        font-size: 13px;
        line-height: 1.5;
        margin: 8px 0;
        border: 1px solid rgba(233,30,99,.2);
    }
    #chatContainer .ai-bubble-content pre code {
        background: transparent;
        color: inherit;
        padding: 0;
        font-size: inherit;
    }
    #chatContainer .ai-bubble-content code {
        background: rgba(233,30,99,.1);
        color: #f48fb1;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
    }
    .copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(233,30,99,.15);
        color: #f48fb1;
        border: 1px solid rgba(233,30,99,.3);
        border-radius: 4px;
        padding: 2px 10px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(233,30,99,.3); }
    .copy-btn.copied { background: #e91e63; color: #fff; border-color: #e91e63; }

    /* ===== Markdown通用样式优化 ===== */
    #chatContainer .ai-bubble-content h1,
    #chatContainer .ai-bubble-content h2,
    #chatContainer .ai-bubble-content h3 {
        margin-top: 12px;
        margin-bottom: 6px;
        font-weight: 600;
        color: #fce4ec;
    }
    #chatContainer .ai-bubble-content h1 { font-size: 18px; }
    #chatContainer .ai-bubble-content h2 { font-size: 16px; }
    #chatContainer .ai-bubble-content h3 { font-size: 15px; }
    #chatContainer .ai-bubble-content ul,
    #chatContainer .ai-bubble-content ol {
        padding-left: 20px;
        margin-bottom: 8px;
    }
    #chatContainer .ai-bubble-content li { margin-bottom: 2px; }
    #chatContainer .ai-bubble-content blockquote {
        border-left: 3px solid #e91e63;
        padding-left: 12px;
        margin: 8px 0;
        color: #b39ddb;
    }
    #chatContainer .ai-bubble-content hr {
        border: none;
        border-top: 1px solid rgba(179,157,219,.2);
        margin: 10px 0;
    }
    #chatContainer .ai-bubble-content p {
        margin-bottom: 6px;
    }
    #chatContainer .ai-bubble-content p:last-child {
        margin-bottom: 0;
    }
</style>
<div class="page-header" style="padding-right:20px;">
    <h3><i class="bi bi-chat-dots-fill"></i> AI智能助手</h3>
</div>
<div class="card" id="chatCard">
    <div class="card-body p-0 d-flex flex-column">
        <!-- 对话窗口 -->
        <div id="chatContainer" style="padding: 20px; background: linear-gradient(160deg, rgba(15,12,41,.3), rgba(36,36,62,.5));">
            <div class="text-center py-5" style="color:#b39ddb;">
                <i class="bi bi-robot" style="font-size:3rem;color:#e91e63;"></i>
                <p class="mt-2 mb-0" style="color:#fce4ec;">粤教智能助手，随时为您服务</p>
                <small>输入问题或上传文件开始对话</small>
            </div>
        </div>
        <!-- 输入区域 -->
        <div class="border-top p-3" style="background: rgba(15,12,41,.8); flex-shrink:0; border-color:rgba(233,30,99,.2)!important;">
            <!-- 文件预览 -->
            <div id="filePreview" class="mb-2" style="display:none;">
                <div class="d-flex align-items-center gap-2 flex-wrap" id="filePreviewList"></div>
            </div>
            <div class="d-flex align-items-end gap-2">
                <label class="btn btn-outline-secondary mb-0" title="上传文件" style="flex-shrink:0;">
                    <i class="bi bi-paperclip"></i>
                    <input type="file" id="fileInput" multiple style="display:none;" onchange="handleFileSelect(event)">
                </label>
                <textarea id="chatInput" class="form-control" rows="1" placeholder="输入消息..." 
                    style="resize:none;max-height:120px;" 
                    onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                <button id="sendBtn" class="btn btn-primary mb-0" style="flex-shrink:0;" onclick="sendMessage()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<script>
let conversationId = '';
let pendingFiles = []; // [File]
let queryTimer = null;  // 计时器
let queryStart = 0;     // 开始时间戳
const chatContainer = document.getElementById('chatContainer');
const chatInput = document.getElementById('chatInput');

// 方案2: 复制代码按钮
function copyCode(btn) {
    const code = btn.previousElementSibling.textContent;
    navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
    });
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function handleFileSelect(e) {
    for (const file of e.target.files) {
        pendingFiles.push(file);
    }
    renderFilePreview();
    e.target.value = '';
}

function removePendingFile(index) {
    pendingFiles.splice(index, 1);
    renderFilePreview();
}

function renderFilePreview() {
    const container = document.getElementById('filePreview');
    const list = document.getElementById('filePreviewList');
    if (pendingFiles.length === 0) {
        container.style.display = 'none';
        return;
    }
    container.style.display = 'block';
    list.innerHTML = pendingFiles.map((f, i) => `
        <span class="badge bg-light text-dark border d-flex align-items-center gap-1 py-2 px-3">
            <i class="bi ${f.type.startsWith('image/') ? 'bi-image' : 'bi-file-earmark'}"></i>
            ${f.name.length > 20 ? f.name.slice(0, 17) + '...' : f.name}
            <i class="bi bi-x-circle text-danger" style="cursor:pointer;" onclick="removePendingFile(${i})"></i>
        </span>
    `).join('');
}

function formatDuration(ms) {
    const sec = Math.floor(ms / 1000);
    const min = Math.floor(sec / 60);
    const s = sec % 60;
    if (min > 0) return `${min}分${s}秒`;
    return `${s}秒`;
}

function appendMessage(role, content, isMarkdown = false, elapsed = null) {
    const welcome = chatContainer.querySelector('.text-center.text-muted');
    if (welcome) welcome.remove();

    const isUser = role === 'user';
    const div = document.createElement('div');
    div.className = `d-flex mb-3 ${isUser ? 'justify-content-end' : 'justify-content-start'}`;

    const avatar = isUser
        ? '<div class="rounded-circle d-flex align-items-center justify-content-center me-2" style="width:36px;height:36px;flex-shrink:0;font-size:14px;background:linear-gradient(135deg,#e91e63,#533483);color:#fff;"><i class="bi bi-person-fill"></i></div>'
        : '<div class="rounded-circle d-flex align-items-center justify-content-center me-2" style="width:36px;height:36px;flex-shrink:0;font-size:14px;background:linear-gradient(135deg,#533483,#7b1fa2);color:#fce4ec;"><i class="bi bi-robot"></i></div>';

    const bubbleStyle = isUser
        ? 'background:linear-gradient(135deg,#e91e63,#533483);color:#fce4ec;border-radius:16px 16px 4px 16px;'
        : 'background:rgba(30,30,54,.9);color:#ce93d8;border-radius:16px 16px 16px 4px;border:1px solid rgba(233,30,99,.2);';

    // 配置marked渲染，优化表格和代码块
    let htmlContent;
    if (isMarkdown) {
        const renderer = new marked.Renderer();
        // 表格外包裹横向滚动容器
        renderer.table = function(header, body) {
            return `<div class="table-wrapper"><table>${header}${body}</table></div>`;
        };
        // 代码块：转义HTML防XSS + 添加复制按钮
        renderer.code = function(code, language) {
            const lang = language || '';
            const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            return `<pre><code class="language-${lang}">${escaped}</code><button class="copy-btn" onclick="copyCode(this)">复制</button></pre>`;
        };
        htmlContent = marked.parse(content, { renderer, breaks: true, gfm: true });
    } else {
        htmlContent = content.replace(/\n/g, '<br>');
    }

    // AI消息下方显示计时
    const timerHtml = (!isUser && elapsed !== null)
        ? `<div style="font-size:11px;color:#b39ddb;margin-top:4px;"><i class="bi bi-clock"></i> 耗时 ${formatDuration(elapsed)}</div>`
        : '';

    div.innerHTML = `
        ${!isUser ? avatar : ''}
        <div style="max-width:90%;${bubbleStyle}word-break:break-word;line-height:1.6;font-size:14px;">
            <div class="px-3 py-2 ${!isUser ? 'ai-bubble-content' : ''}">${htmlContent}</div>
            ${timerHtml ? `<div class="px-3 pb-2">${timerHtml}</div>` : ''}
        </div>
        ${isUser ? avatar.replace('me-2', 'ms-2') : ''}
    `;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

function appendLoading() {
    const div = document.createElement('div');
    div.className = 'd-flex mb-3 justify-content-start';
    div.id = 'loadingMsg';
    div.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;margin-right:8px;">
            <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:36px;height:36px;font-size:14px;background:linear-gradient(135deg,#533483,#7b1fa2);color:#fce4ec;"><i class="bi bi-robot"></i></div>
            <small id="queryTimer" style="color:#b39ddb;font-size:11px;margin-top:4px;">0秒</small>
        </div>
        <div class="px-3 py-2" style="background:rgba(30,30,54,.9);color:#b39ddb;border-radius:16px 16px 16px 4px;border:1px solid rgba(233,30,99,.2);">
            <span class="dot-flashing"></span> 思考中...
        </div>
    `;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    // 启动计时器
    queryStart = Date.now();
    queryTimer = setInterval(() => {
        const el = document.getElementById('queryTimer');
        if (el) el.textContent = formatDuration(Date.now() - queryStart);
    }, 1000);

    if (!document.getElementById('dotStyle')) {
        const style = document.createElement('style');
        style.id = 'dotStyle';
        style.textContent = `.dot-flashing{position:relative;width:8px;height:8px;border-radius:50%;background-color:#e91e63;animation:dotFlashing 1s infinite linear alternate;animation-delay:.5s}
        .dot-flashing::before,.dot-flashing::after{content:'';display:inline-block;position:absolute;top:0}
        .dot-flashing::before{left:-14px;width:8px;height:8px;border-radius:50%;background-color:#e91e63;animation:dotFlashing 1s infinite alternate;animation-delay:0s}
        .dot-flashing::after{left:14px;width:8px;height:8px;border-radius:50%;background-color:#e91e63;animation:dotFlashing 1s infinite alternate;animation-delay:1s}
        @keyframes dotFlashing{0%{background-color:#e91e63}50%,100%{background-color:#533483}}`;
        document.head.appendChild(style);
    }
}

function removeLoading() {
    if (queryTimer) { clearInterval(queryTimer); queryTimer = null; }
    const el = document.getElementById('loadingMsg');
    if (el) el.remove();
}

async function sendMessage() {
    const query = chatInput.value.trim();
    if (!query) {
        showToast('请输入文本内容', 'warning');
        chatInput.focus();
        return;
    }

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    chatInput.disabled = true;

    // 显示用户消息（含文件名）
    let displayText = query;
    if (pendingFiles.length > 0) {
        const fileNames = pendingFiles.map(f => f.name).join(', ');
        displayText = (query ? query + '\n' : '') + `[附件: ${fileNames}]`;
    }
    appendMessage('user', displayText);
    chatInput.value = '';
    chatInput.style.height = 'auto';

    // 用 FormData 一次性提交文本和文件（uid和token必传）
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const formData = new FormData();
    formData.append('query', query);
    formData.append('conversation_id', conversationId);
    formData.append('uid', String(user.uid || ''));
    formData.append('token', getToken());
    pendingFiles.forEach(f => formData.append('files', f));
    pendingFiles = [];
    renderFilePreview();

    appendLoading();

    try {
        const res = await fetch('/api/ai-chat/message', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + getToken() },
            body: formData,
        });
        const data = await res.json();
        const elapsed = Date.now() - queryStart;
        removeLoading();

        if (data.code === 200 && data.data) {
            conversationId = data.data.conversation_id || '';
            appendMessage('assistant', data.data.answer, true, elapsed);
        } else {
            const errMsg = data.msg || data.detail || '抱歉，请求出错，请稍后重试。';
            appendMessage('assistant', errMsg, false, elapsed);
        }
    } catch (e) {
        const elapsed = Date.now() - queryStart;
        removeLoading();
        appendMessage('assistant', '网络错误，请检查连接后重试。', false, elapsed);
    }

    sendBtn.disabled = false;
    chatInput.disabled = false;
    chatInput.focus();
}
</script>
{% endblock %}
