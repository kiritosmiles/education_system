{% extends "base.html" %}
{% block title %}AI智能助手{% endblock %}
{% block content %}
<style>
    /* 让整条flex链高度约束生效，页面不出现整体滚动 */
    .container-fluid, .container-fluid > .row {
        height: 100vh;
        overflow: hidden;
    }
    .col-md-10.main-content {
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        padding-right: 0 !important;
    }
    #chatCard {
        flex: 1 1 0%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: rgba(15,12,41,.6);
    }
    #chatCard > .card-body {
        flex: 1 1 0%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    #chatContainer {
        flex: 1 1 0%;
        min-height: 0;
        overflow-y: auto;
    }
    #chatContainer::-webkit-scrollbar { width: 6px; }
    #chatContainer::-webkit-scrollbar-track { background: rgba(15,12,41,.3); border-radius: 3px; }
    #chatContainer::-webkit-scrollbar-thumb { background: rgba(233,30,99,.3); border-radius: 3px; }
    #chatContainer::-webkit-scrollbar-thumb:hover { background: rgba(233,30,99,.5); }

    /* ===== 表格横向滚动 + 样式美化 ===== */
    #chatContainer .ai-bubble-content .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid rgba(179,157,219,.2);
    }
    #chatContainer .ai-bubble-content table {
        border-collapse: collapse;
        width: 100%;
        margin: 0;
    }
    #chatContainer .ai-bubble-content table th {
        background: linear-gradient(135deg, #e91e63, #533483);
        color: #fff;
        font-weight: 600;
        padding: 8px 12px;
        font-size: 13px;
        border: 1px solid rgba(233,30,99,.3);
        white-space: nowrap;
    }
    #chatContainer .ai-bubble-content table td {
        padding: 6px 12px;
        font-size: 13px;
        border: 1px solid rgba(179,157,219,.15);
        white-space: pre-wrap;
        word-break: break-word;
        color: #ce93d8;
    }
    #chatContainer .ai-bubble-content table tr:nth-child(even) td {
        background: rgba(83,52,131,.1);
    }
    #chatContainer .ai-bubble-content table tr:hover td {
        background: rgba(233,30,99,.1);
    }

    /* ===== 代码块高亮+复制按钮 ===== */
    #chatContainer .ai-bubble-content pre {
        position: relative;
        background: #0f0c29;
        color: #f48fb1;
        border-radius: 8px;
        padding: 16px;
        overflow-x: auto;
        font-size: 13px;
        line-height: 1.5;
        margin: 8px 0;
        border: 1px solid rgba(233,30,99,.2);
    }
    #chatContainer .ai-bubble-content pre code {
        background: transparent;
        color: inherit;
        padding: 0;
        font-size: inherit;
    }
    #chatContainer .ai-bubble-content code {
        background: rgba(233,30,99,.1);
        color: #f48fb1;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
    }
    .copy-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(233,30,99,.15);
        color: #f48fb1;
        border: 1px solid rgba(233,30,99,.3);
        border-radius: 4px;
        padding: 2px 10px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(233,30,99,.3); }
    .copy-btn.copied { background: #e91e63; color: #fff; border-color: #e91e63; }

    /* ===== Markdown通用样式优化 ===== */
    #chatContainer .ai-bubble-content h1,
    #chatContainer .ai-bubble-content h2,
    #chatContainer .ai-bubble-content h3 {
        margin-top: 12px;
        margin-bottom: 6px;
        font-weight: 600;
        color: #fce4ec;
    }
    #chatContainer .ai-bubble-content h1 { font-size: 18px; }
    #chatContainer .ai-bubble-content h2 { font-size: 16px; }
    #chatContainer .ai-bubble-content h3 { font-size: 15px; }
    #chatContainer .ai-bubble-content ul,
    #chatContainer .ai-bubble-content ol {
        padding-left: 20px;
        margin-bottom: 8px;
    }
    #chatContainer .ai-bubble-content li { margin-bottom: 2px; }
    #chatContainer .ai-bubble-content blockquote {
        border-left: 3px solid #e91e63;
        padding-left: 12px;
        margin: 8px 0;
        color: #b39ddb;
    }
    #chatContainer .ai-bubble-content hr {
        border: none;
        border-top: 1px solid rgba(179,157,219,.2);
        margin: 10px 0;
    }
    #chatContainer .ai-bubble-content p {
        margin-bottom: 6px;
    }
    #chatContainer .ai-bubble-content p:last-child {
        margin-bottom: 0;
    }

    /* ===== 流式光标动画 ===== */
    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }
    .streaming-cursor::after {
        content: '▍';
        color: #e91e63;
        animation: blink 0.8s infinite;
        margin-left: 2px;
    }
</style>
<div class="page-header" style="padding-right:20px;">
    <h3><i class="bi bi-chat-dots-fill"></i> AI智能助手</h3>
</div>
<div class="card" id="chatCard">
    <div class="card-body p-0 d-flex flex-column">
        <!-- 对话窗口 -->
        <div id="chatContainer" style="padding: 20px; background: linear-gradient(160deg, rgba(15,12,41,.3), rgba(36,36,62,.5));">
            <div class="text-center py-5" style="color:#b39ddb;">
                <i class="bi bi-robot" style="font-size:3rem;color:#e91e63;"></i>
                <p class="mt-2 mb-0" style="color:#fce4ec;">粤教智能助手，随时为您服务</p>
                <small>输入问题或上传文件开始对话</small>
            </div>
        </div>
        <!-- 输入区域 -->
        <div class="border-top p-3" style="background: rgba(15,12,41,.8); flex-shrink:0; border-color:rgba(233,30,99,.2)!important;">
            <!-- 文件预览 -->
            <div id="filePreview" class="mb-2" style="display:none;">
                <div class="d-flex align-items-center gap-2 flex-wrap" id="filePreviewList"></div>
            </div>
            <div class="d-flex align-items-end gap-2">
                <label class="btn btn-outline-secondary mb-0" title="上传文件" style="flex-shrink:0;">
                    <i class="bi bi-paperclip"></i>
                    <input type="file" id="fileInput" multiple style="display:none;" onchange="handleFileSelect(event)">
                </label>
                <textarea id="chatInput" class="form-control" rows="1" placeholder="输入消息..." 
                    style="resize:none;max-height:120px;" 
                    onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                <button id="sendBtn" class="btn btn-primary mb-0" style="flex-shrink:0;" onclick="sendMessage()">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<script>
let conversationId = '';
let pendingFiles = [];
let isStreaming = false;
const chatContainer = document.getElementById('chatContainer');
const chatInput = document.getElementById('chatInput');

// 配置 marked 渲染器
function getMarkedRenderer() {
    const renderer = new marked.Renderer();
    renderer.table = function(header, body) {
        return `<div class="table-wrapper"><table>${header}${body}</table></div>`;
    };
    renderer.code = function(code, language) {
        const lang = language || '';
        const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<pre><code class="language-${lang}">${escaped}</code><button class="copy-btn" onclick="copyCode(this)">复制</button></pre>`;
    };
    return renderer;
}

function copyCode(btn) {
    const code = btn.previousElementSibling.textContent;
    navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
    });
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function handleFileSelect(e) {
    for (const file of e.target.files) {
        pendingFiles.push(file);
    }
    renderFilePreview();
    e.target.value = '';
}

function removePendingFile(index) {
    pendingFiles.splice(index, 1);
    renderFilePreview();
}

function renderFilePreview() {
    const container = document.getElementById('filePreview');
    const list = document.getElementById('filePreviewList');
    if (pendingFiles.length === 0) {
        container.style.display = 'none';
        return;
    }
    container.style.display = 'block';
    list.innerHTML = pendingFiles.map((f, i) => `
        <span class="badge bg-light text-dark border d-flex align-items-center gap-1 py-2 px-3">
            <i class="bi ${f.type.startsWith('image/') ? 'bi-image' : 'bi-file-earmark'}"></i>
            ${f.name.length > 20 ? f.name.slice(0, 17) + '...' : f.name}
            <i class="bi bi-x-circle text-danger" style="cursor:pointer;" onclick="removePendingFile(${i})"></i>
        </span>
    `).join('');
}

function formatDuration(ms) {
    const sec = Math.floor(ms / 1000);
    const min = Math.floor(sec / 60);
    const s = sec % 60;
    if (min > 0) return `${min}分${s}秒`;
    return `${s}秒`;
}

function appendMessage(role, content, isMarkdown = false, elapsed = null) {
    const welcome = chatContainer.querySelector('.text-center.py-5');
    if (welcome) welcome.remove();

    const isUser = role === 'user';
    const div = document.createElement('div');
    div.className = `d-flex mb-3 ${isUser ? 'justify-content-end' : 'justify-content-start'}`;

    const avatar = isUser
        ? '<div class="rounded-circle d-flex align-items-center justify-content-center me-2" style="width:36px;height:36px;flex-shrink:0;font-size:14px;background:linear-gradient(135deg,#e91e63,#533483);color:#fff;"><i class="bi bi-person-fill"></i></div>'
        : '<div class="rounded-circle d-flex align-items-center justify-content-center me-2" style="width:36px;height:36px;flex-shrink:0;font-size:14px;background:linear-gradient(135deg,#533483,#7b1fa2);color:#fce4ec;"><i class="bi bi-robot"></i></div>';

    const bubbleStyle = isUser
        ? 'background:linear-gradient(135deg,#e91e63,#533483);color:#fce4ec;border-radius:16px 16px 4px 16px;'
        : 'background:rgba(30,30,54,.9);color:#ce93d8;border-radius:16px 16px 16px 4px;border:1px solid rgba(233,30,99,.2);';

    let htmlContent;
    if (isMarkdown) {
        htmlContent = marked.parse(content, { renderer: getMarkedRenderer(), breaks: true, gfm: true });
    } else {
        htmlContent = content.replace(/\n/g, '<br>');
    }

    const timerHtml = (!isUser && elapsed !== null)
        ? `<div style="font-size:11px;color:#b39ddb;margin-top:4px;"><i class="bi bi-clock"></i> 耗时 ${formatDuration(elapsed)}</div>`
        : '';

    div.innerHTML = `
        ${!isUser ? avatar : ''}
        <div style="max-width:90%;${bubbleStyle}word-break:break-word;line-height:1.6;font-size:14px;">
            <div class="px-3 py-2 ${!isUser ? 'ai-bubble-content' : ''}">${htmlContent}</div>
            ${timerHtml ? `<div class="px-3 pb-2">${timerHtml}</div>` : ''}
        </div>
        ${isUser ? avatar.replace('me-2', 'ms-2') : ''}
    `;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return div;
}

/**
 * 创建流式AI消息气泡，返回更新函数
 */
function createStreamingBubble() {
    const welcome = chatContainer.querySelector('.text-center.py-5');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = 'd-flex mb-3 justify-content-start';

    const avatar = '<div class="rounded-circle d-flex align-items-center justify-content-center me-2" style="width:36px;height:36px;flex-shrink:0;font-size:14px;background:linear-gradient(135deg,#533483,#7b1fa2);color:#fce4ec;"><i class="bi bi-robot"></i></div>';

    div.innerHTML = `
        ${avatar}
        <div style="max-width:90%;background:rgba(30,30,54,.9);color:#ce93d8;border-radius:16px 16px 16px 4px;border:1px solid rgba(233,30,99,.2);word-break:break-word;line-height:1.6;font-size:14px;">
            <div class="px-3 py-2 ai-bubble-content streaming-cursor" id="streamContent"></div>
            <div class="px-3 pb-2" id="streamMeta"></div>
        </div>
    `;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    let fullText = '';
    const startTime = Date.now();

    return {
        append(chunk) {
            fullText += chunk;
            const el = document.getElementById('streamContent');
            if (el) {
                el.innerHTML = marked.parse(fullText, { renderer: getMarkedRenderer(), breaks: true, gfm: true });
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        },
        finish(cid) {
            const el = document.getElementById('streamContent');
            if (el) el.classList.remove('streaming-cursor');
            const elapsed = Date.now() - startTime;
            const meta = document.getElementById('streamMeta');
            if (meta) {
                meta.innerHTML = `<div style="font-size:11px;color:#b39ddb;margin-top:4px;"><i class="bi bi-clock"></i> 耗时 ${formatDuration(elapsed)}</div>`;
            }
            if (cid) conversationId = cid;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        },
        error(msg) {
            const el = document.getElementById('streamContent');
            if (el) {
                el.classList.remove('streaming-cursor');
                el.innerHTML = `<span style="color:#ef5350;">${msg}</span>`;
            }
        }
    };
}

async function sendMessage() {
    const query = chatInput.value.trim();
    if (!query || isStreaming) {
        if (!query) showToast('请输入文本内容', 'warning');
        return;
    }

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    chatInput.disabled = true;
    isStreaming = true;

    // 显示用户消息
    let displayText = query;
    if (pendingFiles.length > 0) {
        const fileNames = pendingFiles.map(f => f.name).join(', ');
        displayText = (query ? query + '\n' : '') + `[附件: ${fileNames}]`;
    }
    appendMessage('user', displayText);
    chatInput.value = '';
    chatInput.style.height = 'auto';

    // 构建 FormData
    const formData = new FormData();
    formData.append('query', query);
    formData.append('conversation_id', conversationId);
    pendingFiles.forEach(f => formData.append('files', f));
    pendingFiles = [];
    renderFilePreview();

    // 创建流式气泡
    const bubble = createStreamingBubble();

    try {
        const res = await fetch('/api/ai-chat/stream', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + getToken() },
            body: formData,
        });

        if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            bubble.error(errData.msg || errData.detail || `请求失败(${res.status})`);
            return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            // 按双换行拆分SSE事件
            const parts = buffer.split('\n\n');
            // 最后一段可能不完整，保留到下次
            buffer = parts.pop() || '';

            for (const part of parts) {
                const dataLine = part.trim();
                if (!dataLine.startsWith('data:')) continue;
                const jsonStr = dataLine.slice(5).trim();
                if (jsonStr === '[DONE]') {
                    bubble.finish();
                    continue;
                }
                try {
                    const event = JSON.parse(jsonStr);
                    if (event.event === 'message') {
                        bubble.append(event.answer || '');
                    } else if (event.event === 'message_end') {
                        bubble.finish(event.conversation_id);
                    } else if (event.event === 'error') {
                        bubble.error(event.message || 'AI服务异常');
                    }
                    // workflow 等中间事件静默忽略
                } catch (e) {
                    // 非JSON行，忽略
                }
            }
        }

        // 处理buffer中剩余的数据
        if (buffer.trim().startsWith('data:')) {
            const jsonStr = buffer.trim().slice(5).trim();
            if (jsonStr !== '[DONE]') {
                try {
                    const event = JSON.parse(jsonStr);
                    if (event.event === 'message') {
                        bubble.append(event.answer || '');
                    } else if (event.event === 'message_end') {
                        bubble.finish(event.conversation_id);
                    } else if (event.event === 'error') {
                        bubble.error(event.message || 'AI服务异常');
                    }
                } catch (e) {}
            }
        }

        // 如果流结束了但没收到 message_end，手动收尾
        const el = document.getElementById('streamContent');
        if (el && el.classList.contains('streaming-cursor')) {
            bubble.finish();
        }

    } catch (e) {
        bubble.error('网络错误，请检查连接后重试。');
    }

    isStreaming = false;
    sendBtn.disabled = false;
    chatInput.disabled = false;
    chatInput.focus();
}
</script>
{% endblock %}
