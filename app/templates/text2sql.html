{% extends "base.html" %}
{% block title %}智能查询{% endblock %}
{% block content %}
<div class="page-header">
    <h3><i class="bi bi-robot"></i> 智能查询 (Text2SQL)</h3>
</div>
<div class="card">
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label">请输入自然语言问题</label>
            <div class="input-group">
                <input type="text" class="form-control" id="questionInput" placeholder="例如：查询所有未联系的顾客" required>
                <button class="btn btn-primary" onclick="queryText2SQL()"><i class="bi bi-search"></i> 查询</button>
            </div>
        </div>
        <div id="sqlDisplay" class="mb-3" style="display:none">
            <label class="form-label">生成的SQL</label>
            <pre class="bg-light p-3 rounded"><code id="sqlCode"></code></pre>
        </div>
        <div id="resultArea" style="display:none">
            <label class="form-label">查询结果 (<span id="resultTotal"></span>条)</label>
            <div class="table-responsive">
                <table class="table table-bordered table-hover" id="resultTable">
                    <thead id="resultHead"></thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>
        </div>
        <div id="errorArea" class="alert alert-danger" style="display:none"></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function queryText2SQL() {
    const question = document.getElementById('questionInput').value.trim();
    if (!question) { showToast('请输入问题', 'warning'); return; }

    document.getElementById('sqlDisplay').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('errorArea').style.display = 'none';

    try {
        const res = await apiPost('/api/text2sql/query', { question });
        if (res.code === 200 && res.data) {
            document.getElementById('sqlCode').textContent = res.data.sql;
            document.getElementById('sqlDisplay').style.display = 'block';
            document.getElementById('resultTotal').textContent = res.data.total;
            const columns = res.data.columns || [];
            const labels = res.data.labels || columns;
            const rows = res.data.rows || [];
            document.getElementById('resultHead').innerHTML = '<tr>' + labels.map(l => `<th>${l}</th>`).join('') + '</tr>';
            document.getElementById('resultBody').innerHTML = rows.map(r => '<tr>' + columns.map(c => `<td>${r[c] ?? '-'}</td>`).join('') + '</tr>').join('');
            document.getElementById('resultArea').style.display = 'block';
        } else {
            document.getElementById('errorArea').textContent = res.detail || res.msg || '查询失败';
            document.getElementById('errorArea').style.display = 'block';
        }
    } catch(err) {
        document.getElementById('errorArea').textContent = '请求失败: ' + (err.message || '');
        document.getElementById('errorArea').style.display = 'block';
    }
}

document.getElementById('questionInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') queryText2SQL();
});
</script>
{% endblock %}
