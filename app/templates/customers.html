{% extends "base.html" %}
{% block title %}顾客管理{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h3><i class="bi bi-person-lines-fill"></i> 顾客管理</h3>
    <button class="btn btn-primary" onclick="showAddModal()"><i class="bi bi-plus-lg"></i> 新增顾客</button>
</div>
<div class="card">
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-3"><input type="text" class="form-control" id="searchName" placeholder="搜索姓名"></div>
            <div class="col-md-3">
                <select class="form-select" id="searchStatus">
                    <option value="">全部状态</option>
                    <option value="0">未联系</option>
                    <option value="1">已联系未回复</option>
                    <option value="2">已联系无意向</option>
                    <option value="3">已联系有意向</option>
                    <option value="4">已入学</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="searchRank">
                    <option value="">全部评级</option>
                    <option value="0">核心顾客</option>
                    <option value="1">重要顾客</option>
                    <option value="2">普通顾客</option>
                    <option value="3">边缘顾客</option>
                </select>
            </div>
            <div class="col-md-3"><button class="btn btn-primary" onclick="loadCustomers()"><i class="bi bi-search"></i> 搜索</button></div>
        </div>
        <table class="table table-hover">
            <thead><tr><th>ID</th><th>姓名</th><th>年龄</th><th>性别</th><th>手机</th><th>邮箱</th><th>学历</th><th>评级</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
            <tbody id="customerTable"></tbody>
        </table>
        <nav><ul class="pagination" id="pagination"></ul></nav>
    </div>
</div>

<div class="modal fade" id="customerModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="modalTitle">新增顾客</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="customerForm">
                    <input type="hidden" id="editCid">
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">姓名</label><input type="text" class="form-control" id="f_c_name" minlength="2" maxlength="20" required></div>
                        <div class="col-md-6 mb-3"><label class="form-label">年龄</label><input type="number" class="form-control" id="f_c_age" min="0" max="150"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">性别</label><select class="form-select" id="f_c_gender"><option value="0">男</option><option value="1">女</option></select></div>
                        <div class="col-md-6 mb-3"><label class="form-label">手机</label><input type="text" class="form-control" id="f_c_phone" maxlength="11"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">邮箱</label><input type="email" class="form-control" id="f_c_email"></div>
                        <div class="col-md-6 mb-3"><label class="form-label">学历</label><input type="text" class="form-control" id="f_c_degree" placeholder="如：本科"></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3"><label class="form-label">联系负责人UID</label><input type="number" class="form-control" id="f_link_uid"></div>
                        <div class="col-md-6 mb-3"><label class="form-label">顾客状态</label>
                            <select class="form-select" id="f_c_status">
                                <option value="0">未联系</option><option value="1">已联系未回复</option>
                                <option value="2">已联系无意向</option><option value="3">已联系有意向</option><option value="4">已入学</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3"><label class="form-label">顾客评级</label>
                            <select class="form-select" id="f_c_rank">
                                <option value="0">核心顾客</option><option value="1">重要顾客</option>
                                <option value="2">普通顾客</option><option value="3">边缘顾客</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3"><label class="form-label">顾客研判分析总结</label><textarea class="form-control" id="f_c_analyze_info" rows="3"></textarea></div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button type="button" class="btn btn-primary" onclick="saveCustomer()">保存</button></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1;
async function loadCustomers(page = 1) {
    currentPage = page;
    const c_name = document.getElementById('searchName').value;
    const c_status = document.getElementById('searchStatus').value;
    let url = `/api/customers?page=${page}&size=10`;
    if (c_name) url += `&c_name=${c_name}`;
    if (c_status !== '') url += `&c_status=${c_status}`;
    const c_rank = document.getElementById('searchRank').value;
    if (c_rank !== '') url += `&c_rank=${c_rank}`;
    const res = await apiGet(url);
    const items = res.data?.items || [];
    document.getElementById('customerTable').innerHTML = items.map(c => `<tr>
        <td>${c.c_id}</td><td>${c.c_name}</td><td>${c.c_age??'-'}</td><td>${genderText(c.c_gender)}</td>
        <td>${c.c_phone||'-'}</td><td>${c.c_email||'-'}</td><td>${c.c_degree||'-'}</td>
        <td>${rankBadge(c.c_rank)}</td><td>${customerStatusBadge(c.c_status)}</td><td>${formatDate(c.create_time)}</td>
        <td><button class="btn btn-sm btn-outline-primary" onclick="editCustomer(${c.c_id})"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${c.c_id})"><i class="bi bi-trash"></i></button></td>
    </tr>`).join('');
    const total = res.data?.total || 0;
    const pages = Math.ceil(total / 10);
    let html = '';
    for (let i = 1; i <= pages; i++) html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="loadCustomers(${i})">${i}</a></li>`;
    document.getElementById('pagination').innerHTML = html;
}

function showAddModal() {
    document.getElementById('modalTitle').textContent = '新增顾客';
    document.getElementById('editCid').value = '';
    document.getElementById('customerForm').reset();
    new bootstrap.Modal(document.getElementById('customerModal')).show();
}

async function editCustomer(c_id) {
    const res = await apiGet(`/api/customers/${c_id}`);
    const c = res.data;
    document.getElementById('modalTitle').textContent = '编辑顾客';
    document.getElementById('editCid').value = c.c_id;
    document.getElementById('f_c_name').value = c.c_name;
    document.getElementById('f_c_age').value = c.c_age || '';
    document.getElementById('f_c_gender').value = c.c_gender;
    document.getElementById('f_c_phone').value = c.c_phone || '';
    document.getElementById('f_c_email').value = c.c_email || '';
    document.getElementById('f_c_degree').value = c.c_degree || '';
    document.getElementById('f_link_uid').value = c.link_uid || '';
    document.getElementById('f_c_status').value = c.c_status;
    document.getElementById('f_c_rank').value = c.c_rank ?? 3;
    document.getElementById('f_c_analyze_info').value = c.c_analyze_info || '';
    new bootstrap.Modal(document.getElementById('customerModal')).show();
}

async function saveCustomer() {
    const c_id = document.getElementById('editCid').value;
    const data = {
        c_name: document.getElementById('f_c_name').value,
        c_age: document.getElementById('f_c_age').value ? parseInt(document.getElementById('f_c_age').value) : null,
        c_gender: parseInt(document.getElementById('f_c_gender').value),
        c_phone: document.getElementById('f_c_phone').value || null,
        c_email: document.getElementById('f_c_email').value || null,
        c_degree: document.getElementById('f_c_degree').value || null,
        link_uid: document.getElementById('f_link_uid').value ? parseInt(document.getElementById('f_link_uid').value) : null,
        c_status: parseInt(document.getElementById('f_c_status').value),
        c_rank: parseInt(document.getElementById('f_c_rank').value),
        c_analyze_info: document.getElementById('f_c_analyze_info').value || null
    };
    if (c_id) { await apiPut(`/api/customers/${c_id}`, data); }
    else { await apiPost('/api/customers', data); }
    bootstrap.Modal.getInstance(document.getElementById('customerModal')).hide();
    showToast(c_id ? '修改成功' : '创建成功');
    loadCustomers(currentPage);
}

async function deleteCustomer(c_id) {
    if (!confirm('确认删除该顾客？')) return;
    await apiDelete(`/api/customers/${c_id}`);
    showToast('删除成功');
    loadCustomers(currentPage);
}

function rankBadge(rank) {
    const map = {0:'核心顾客',1:'重要顾客',2:'普通顾客',3:'边缘顾客'};
    const colorMap = {0:'danger',1:'warning',2:'info',3:'secondary'};
    return `<span class="badge bg-${colorMap[rank]??'secondary'}">${map[rank]??'未知'}</span>`;
}

loadCustomers();
</script>
{% endblock %}
