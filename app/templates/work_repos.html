{% extends "base.html" %}
{% block title %}工作日报{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h3><i class="bi bi-journal-text"></i> 工作日报</h3>
    <button class="btn btn-primary" onclick="showAddModal()"><i class="bi bi-plus-lg"></i> 新增日报</button>
</div>
<div class="card">
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-2"><input type="text" class="form-control" id="searchTitle" placeholder="搜索标题"></div>
            <div class="col-md-2"><label class="form-label">开始日期</label><input type="date" class="form-control" id="searchStartDate"></div>
            <div class="col-md-2"><label class="form-label">结束日期</label><input type="date" class="form-control" id="searchEndDate"></div>
            <div class="col-md-2"><label class="form-label">&nbsp;</label><button class="btn btn-primary w-100" onclick="loadWorkRepos()"><i class="bi bi-search"></i> 搜索</button></div>
        </div>
        <table class="table table-hover">
            <thead><tr><th>ID</th><th>日期</th><th>标题</th><th>编写人UID</th><th>创建时间</th><th>操作</th></tr></thead>
            <tbody id="workTable"></tbody>
        </table>
        <nav><ul class="pagination" id="pagination"></ul></nav>
    </div>
</div>

<div class="modal fade" id="workModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="modalTitle">新增工作日报</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="workForm">
                    <input type="hidden" id="editWid">
                    <div class="mb-3"><label class="form-label">日报日期</label><input type="date" class="form-control" id="f_w_date" required></div>
                    <div class="mb-3"><label class="form-label">标题</label><input type="text" class="form-control" id="f_w_title" maxlength="20" required></div>
                    <div class="mb-3"><label class="form-label">内容</label><textarea class="form-control" id="f_content" rows="8"></textarea></div>
                </form>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button type="button" class="btn btn-primary" onclick="saveWorkRepo()">保存</button></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let currentPage = 1;
async function loadWorkRepos(page = 1) {
    currentPage = page;
    const w_title = document.getElementById('searchTitle').value;
    const start_date = document.getElementById('searchStartDate').value;
    const end_date = document.getElementById('searchEndDate').value;
    let url = `/api/work-repos?page=${page}&size=10`;
    if (w_title) url += `&w_title=${w_title}`;
    if (start_date) url += `&start_date=${start_date}`;
    if (end_date) url += `&end_date=${end_date}`;
    try {
        const res = await apiGet(url);
        const items = res.data?.items || [];
        document.getElementById('workTable').innerHTML = items.map(w => `<tr>
            <td>${w.w_id}</td><td>${formatDate(w.w_date)}</td><td>${w.w_title}</td><td>${w.u_id}</td><td>${formatDate(w.create_time)}</td>
            <td><button class="btn btn-sm btn-outline-primary" onclick="editWorkRepo(${w.w_id})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteWorkRepo(${w.w_id})"><i class="bi bi-trash"></i></button></td>
        </tr>`).join('');
        const total = res.data?.total || 0;
        const pages = Math.ceil(total / 10);
        let html = '';
        for (let i = 1; i <= pages; i++) html += `<li class="page-item ${i===currentPage?'active':''}"><a class="page-link" href="#" onclick="loadWorkRepos(${i})">${i}</a></li>`;
        document.getElementById('pagination').innerHTML = html;
    } catch(e) { document.getElementById('workTable').innerHTML = '<tr><td colspan="6" class="text-center text-muted">无权限</td></tr>'; }
}

function showAddModal() {
    document.getElementById('modalTitle').textContent = '新增工作日报';
    document.getElementById('editWid').value = '';
    document.getElementById('workForm').reset();
    new bootstrap.Modal(document.getElementById('workModal')).show();
}

async function editWorkRepo(w_id) {
    const res = await apiGet(`/api/work-repos/${w_id}`);
    const w = res.data;
    document.getElementById('modalTitle').textContent = '编辑工作日报';
    document.getElementById('editWid').value = w.w_id;
    document.getElementById('f_w_date').value = w.w_date?.split('T')[0] || '';
    document.getElementById('f_w_title').value = w.w_title;
    document.getElementById('f_content').value = w.content || '';
    new bootstrap.Modal(document.getElementById('workModal')).show();
}

async function saveWorkRepo() {
    const w_id = document.getElementById('editWid').value;
    const data = {
        w_date: document.getElementById('f_w_date').value,
        w_title: document.getElementById('f_w_title').value,
        content: document.getElementById('f_content').value || null
    };
    if (w_id) { await apiPut(`/api/work-repos/${w_id}`, data); }
    else { await apiPost('/api/work-repos', data); }
    bootstrap.Modal.getInstance(document.getElementById('workModal')).hide();
    showToast(w_id ? '修改成功' : '创建成功');
    loadWorkRepos(currentPage);
}

async function deleteWorkRepo(w_id) {
    if (!confirm('确认删除该日报？')) return;
    await apiDelete(`/api/work-repos/${w_id}`);
    showToast('删除成功');
    loadWorkRepos(currentPage);
}

loadWorkRepos();
</script>
{% endblock %}
