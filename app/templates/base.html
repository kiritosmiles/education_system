<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Education System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f5f6fa; }
        .sidebar { min-height: 100vh; background: #2c3e50; }
        .sidebar .nav-link { color: rgba(255,255,255,.8); padding: 12px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); }
        .sidebar .nav-link i { margin-right: 10px; }
        .sidebar .nav-section { color: rgba(255,255,255,.5); font-size: .75rem; text-transform: uppercase; letter-spacing: 1px; padding: 15px 20px 5px; border-top: 1px solid rgba(255,255,255,.1); }
        .sidebar .nav-section:first-child { border-top: none; }
        .main-content { padding: 20px; }
        .card { border: none; box-shadow: 0 0 10px rgba(0,0,0,.08); margin-bottom: 20px; }
        .btn-primary { background-color: #3498db; border-color: #3498db; }
        .btn-primary:hover { background-color: #2980b9; }
        .page-header { margin-bottom: 20px; }
        .form-label { font-weight: 500; }
        .status-badge { font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white border-bottom border-secondary">
                    <h5><i class="bi bi-mortarboard-fill"></i> Education System</h5>
                    <small id="userInfo" class="text-white-50"></small>
                </div>
                <nav class="nav flex-column pt-2" id="sidebarNav">
                    <span class="nav-section" data-section="info">信息管理</span>
                    <a class="nav-link" href="/dashboard" data-section="info"><i class="bi bi-speedometer2"></i>仪表盘</a>
                    <a class="nav-link" href="/users" data-section="info"><i class="bi bi-people"></i>用户管理</a>
                    <a class="nav-link" href="/customers" data-section="info"><i class="bi bi-person-lines-fill"></i>顾客管理</a>
                    <a class="nav-link" href="/work-repos" data-section="info"><i class="bi bi-journal-text"></i>工作日报</a>
                    <a class="nav-link" href="/work-repo-sums" data-section="info"><i class="bi bi-clipboard-data"></i>工作日报总结</a>
                    <a class="nav-link" href="/industry-repos" data-section="info"><i class="bi bi-newspaper"></i>行业周报</a>
                    <a class="nav-link" href="/email" data-section="info"><i class="bi bi-envelope"></i>邮件推送</a>
                    <span class="nav-section" data-section="smart">智能管理</span>
                    <a class="nav-link" href="/ai-chat" data-section="smart"><i class="bi bi-chat-dots"></i>AI助手</a>
                    <a class="nav-link" href="/text2sql" data-section="smart"><i class="bi bi-robot"></i>智能查询</a>
                    <a class="nav-link" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i>退出登录</a>
                </nav>
            </div>
            <!-- Main Content -->
            <div class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '';
        let currentUser = null;

        function getToken() { return localStorage.getItem('token'); }

        function getHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
        }

        async function apiGet(url) {
            const res = await fetch(url, { headers: getHeaders() });
            if (res.status === 401) { logout(); }
            return res.json();
        }

        async function apiPost(url, data) {
            const res = await fetch(url, { method: 'POST', headers: getHeaders(), body: JSON.stringify(data) });
            if (res.status === 401) { logout(); }
            return res.json();
        }

        async function apiPut(url, data) {
            const res = await fetch(url, { method: 'PUT', headers: getHeaders(), body: JSON.stringify(data) });
            if (res.status === 401) { logout(); }
            return res.json();
        }

        async function apiDelete(url) {
            const res = await fetch(url, { method: 'DELETE', headers: getHeaders() });
            if (res.status === 401) { logout(); }
            return res.json();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        function roleText(role) {
            return {0:'管理员', 1:'普通员工', 2:'经理', 3:'学生'}[role] || '未知';
        }

        function genderText(g) {
            return g === 0 ? '男' : '女';
        }

        function customerStatusText(s) {
            return {0:'未联系', 1:'已联系未回复', 2:'已联系无意向', 3:'已联系有意向', 4:'已入学'}[s] || '未知';
        }

        function customerStatusBadge(s) {
            const colors = {0:'secondary', 1:'warning', 2:'danger', 3:'success', 4:'primary'};
            return `<span class="badge bg-${colors[s]||'secondary'} status-badge">${customerStatusText(s)}</span>`;
        }

        async function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (user) {
                currentUser = user;
                document.getElementById('userInfo').textContent = `${user.name} (${roleText(user.role)})`;
                // Hide menus based on role
                const navLinks = document.querySelectorAll('#sidebarNav .nav-link');
                const hrefs = {
                    '/users': [0],
                    '/customers': [0,1,2,3],
                    '/work-repos': [0,1,2],
                    '/work-repo-sums': [0,2],
                    '/industry-repos': [0,1,2,3],
                    '/email': [0,1,2],
                    '/ai-chat': [0,1,2],
                    '/text2sql': [0,1,2,3]
                };
                const sectionVisible = {};
                navLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    const section = link.getAttribute('data-section');
                    if (hrefs[href] && !hrefs[href].includes(user.role)) {
                        link.style.display = 'none';
                    } else if (section) {
                        sectionVisible[section] = true;
                    }
                });
                // Hide section headers if all items in that section are hidden
                document.querySelectorAll('#sidebarNav .nav-section').forEach(sec => {
                    const section = sec.getAttribute('data-section');
                    if (!sectionVisible[section]) {
                        sec.style.display = 'none';
                    }
                });
            }
        }

        function showToast(msg, type='success') {
            const id = 'toast_' + Date.now();
            const html = `<div id="${id}" class="toast align-items-center text-bg-${type} border-0 show" role="alert" style="position:fixed;top:20px;right:20px;z-index:9999">
                <div class="d-flex"><div class="toast-body">${msg}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            setTimeout(() => document.getElementById(id)?.remove(), 3000);
        }

        function formatDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleString('zh-CN');
        }

        loadUserInfo();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
