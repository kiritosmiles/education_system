<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Education System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/fonts/bootstrap-icons.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/fonts/bootstrap-icons.woff" as="font" type="font/woff" crossorigin>
    <style>
        :root {
            --jirai-black: #1a1a2e;
            --jirai-dark: #16213e;
            --jirai-purple: #533483;
            --jirai-pink: #e91e63;
            --jirai-soft-pink: #fce4ec;
            --jirai-lavender: #b39ddb;
            --jirai-surface: #1e1e36;
            --jirai-card: rgba(30,30,54,.85);
            --jirai-text: #e1bee7;
            --jirai-text-dim: #9c8daf;
        }
        body { background: linear-gradient(160deg, #0f0c29 0%, #1a1a2e 40%, #24243e 100%); color: #e1bee7; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #0f0c29 100%); border-right: 1px solid rgba(179,157,219,.15); }
        .sidebar .nav-link { color: rgba(225,190,231,.7); padding: 12px 20px; border-radius: 8px; margin: 2px 10px; transition: all .25s; }
        .sidebar .nav-link:hover { color: #fce4ec; background: rgba(233,30,99,.15); }
        .sidebar .nav-link.active { color: #fff; background: linear-gradient(135deg, rgba(233,30,99,.3), rgba(83,52,131,.3)); border-left: 3px solid #e91e63; }
        .sidebar .nav-link i { margin-right: 10px; color: #e91e63; }
        .sidebar .nav-section { color: rgba(179,157,219,.5); font-size: .7rem; text-transform: uppercase; letter-spacing: 2px; padding: 18px 20px 5px; border-top: 1px solid rgba(179,157,219,.1); }
        .sidebar .nav-section:first-child { border-top: none; }
        .main-content { padding: 20px; }
        .card { border: 1px solid rgba(179,157,219,.12); background: var(--jirai-card); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,.3); margin-bottom: 20px; border-radius: 12px; }
        .card-header { background: rgba(83,52,131,.2); border-bottom: 1px solid rgba(179,157,219,.12); color: #e1bee7; font-weight: 600; }
        .card-body { color: #ce93d8; background: transparent !important; }
        .card { --bs-card-bg: transparent; }
        .btn-primary { background: linear-gradient(135deg, #e91e63, #533483); border: none; border-radius: 8px; font-weight: 500; }
        .btn-primary:hover { background: linear-gradient(135deg, #c2185b, #4a2d74); box-shadow: 0 3px 15px rgba(233,30,99,.35); }
        .btn-outline-primary { color: #e91e63; border-color: rgba(233,30,99,.4); }
        .btn-outline-primary:hover { background: rgba(233,30,99,.15); border-color: #e91e63; color: #f48fb1; }
        .btn-danger { background: linear-gradient(135deg, #e91e63, #c2185b); border: none; }
        .btn-warning { background: linear-gradient(135deg, #ff6f00, #e91e63); border: none; color: #fff; }
        .btn-success { background: linear-gradient(135deg, #7b1fa2, #533483); border: none; }
        .btn-secondary { background: rgba(179,157,219,.15); border: 1px solid rgba(179,157,219,.2); color: #b39ddb; }
        .btn-secondary:hover { background: rgba(179,157,219,.25); color: #e1bee7; }
        .page-header { margin-bottom: 20px; }
        .page-header h3 { color: #fce4ec; font-weight: 700; }
        .page-header h3 i { color: #e91e63; }
        .form-label { font-weight: 500; color: #e1bee7; }
        .form-control, .form-select { background: rgba(255,255,255,.06); border: 1px solid rgba(179,157,219,.2); color: #e1bee7; border-radius: 8px; }
        .form-control:focus, .form-select:focus { background: rgba(255,255,255,.1); border-color: #e91e63; box-shadow: 0 0 0 3px rgba(233,30,99,.15); color: #fce4ec; }
        .form-control::placeholder { color: rgba(179,157,219,.4); }
        .form-select option { background: #1a1a2e; color: #e1bee7; }
        .form-select option:hover, .form-select option:checked { background: rgba(233,30,99,.2); color: #fce4ec; }
        .input-group-text { background: rgba(233,30,99,.1); border: 1px solid rgba(179,157,219,.2); color: #e91e63; }
        .table { --bs-table-bg: rgba(26,26,46,.5); --bs-table-hover-bg: rgba(233,30,99,.12); --bs-table-hover-color: #fce4ec; --bs-table-striped-bg: rgba(179,157,219,.06); --bs-table-color: #e1bee7; --bs-table-border-color: rgba(179,157,219,.12); color: #e1bee7; border-color: rgba(179,157,219,.12); }
        .table thead th { background: rgba(83,52,131,.35) !important; color: #fce4ec; border-color: rgba(179,157,219,.15); font-weight: 600; }
        .table tbody td { background-color: rgba(26,26,46,.3) !important; border-color: rgba(179,157,219,.1); color: #e1bee7; }
        .table td.nowrap, .table th.nowrap { white-space: nowrap; }
        .table-hover tbody tr:hover td { background: rgba(233,30,99,.12) !important; color: #fce4ec; }
        .table-striped tbody tr:nth-child(odd) td { background-color: rgba(179,157,219,.06) !important; }
        .table-bordered { --bs-table-border-color: rgba(179,157,219,.15); }
        .table-bordered > :not(caption) > * > * { border-color: rgba(179,157,219,.12); }
        .badge { border-radius: 6px; }
        .status-badge { font-size: 0.85em; }
        .bg-primary { background: linear-gradient(135deg, #533483, #7b1fa2) !important; }
        .bg-success { background: linear-gradient(135deg, #6a1b9a, #8e24aa) !important; }
        .bg-warning { background: linear-gradient(135deg, #e91e63, #ff6f00) !important; }
        .bg-info { background: linear-gradient(135deg, #1565c0, #533483) !important; }
        .bg-danger { background: linear-gradient(135deg, #e91e63, #c2185b) !important; }
        .bg-secondary { background: rgba(179,157,219,.2) !important; }
        .alert-danger { background: rgba(233,30,99,.12); border-color: rgba(233,30,99,.25); color: #f48fb1; }
        .alert-success { background: rgba(123,31,162,.15); border-color: rgba(123,31,162,.25); color: #ce93d8; }
        .alert-warning { background: rgba(255,111,0,.12); border-color: rgba(255,111,0,.25); color: #ffcc80; }
        .alert-info { background: rgba(83,52,131,.15); border-color: rgba(83,52,131,.25); color: #b39ddb; }
        .bg-light { background: rgba(26,26,46,.7) !important; color: #e1bee7; }
        .form-text { color: var(--jirai-text-dim) !important; }
        .text-muted { color: var(--jirai-text-dim) !important; }
        .border-top { border-color: rgba(179,157,219,.12) !important; }
        .page-link { background: rgba(179,157,219,.1); border-color: rgba(179,157,219,.15); color: #b39ddb; }
        .page-link:hover { background: rgba(233,30,99,.2); border-color: #e91e63; color: #fce4ec; }
        .page-item.active .page-link { background: linear-gradient(135deg, #e91e63, #533483); border-color: #e91e63; }
        .modal-content { background: var(--jirai-surface); border: 1px solid rgba(179,157,219,.15); color: #e1bee7; }
        .modal-header { border-bottom: 1px solid rgba(179,157,219,.12); }
        .modal-footer { border-top: 1px solid rgba(179,157,219,.12); }
        .btn-close { filter: invert(1); }
        .nav-tabs .nav-link { color: #b39ddb; }
        .nav-tabs .nav-link.active { color: #fce4ec; background: rgba(233,30,99,.1); border-color: rgba(179,157,219,.15); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(26,26,46,.5); }
        ::-webkit-scrollbar-thumb { background: rgba(233,30,99,.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(233,30,99,.5); }
        ::selection { background: rgba(233,30,99,.3); color: #fce4ec; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-white border-bottom" style="border-color:rgba(233,30,99,.2)!important;">
                    <h5 style="color:#fce4ec;"><i class="bi bi-mortarboard-fill" style="color:#e91e63"></i> Education System</h5>
                    <small id="userInfo" style="color:#b39ddb;"></small>
                </div>
                <nav class="nav flex-column pt-2" id="sidebarNav">
                    <span class="nav-section" data-section="info">信息管理</span>
                    <a class="nav-link" href="/dashboard" data-section="info"><i class="bi bi-speedometer2"></i>仪表盘</a>
                    <a class="nav-link" href="/users" data-section="info"><i class="bi bi-people"></i>用户管理</a>
                    <a class="nav-link" href="/customers" data-section="info"><i class="bi bi-person-lines-fill"></i>顾客管理</a>
                    <a class="nav-link" href="/work-repos" data-section="info"><i class="bi bi-journal-text"></i>工作日报</a>
                    <a class="nav-link" href="/work-repo-sums" data-section="info"><i class="bi bi-clipboard-data"></i>工作日报总结</a>
                    <a class="nav-link" href="/industry-repos" data-section="info"><i class="bi bi-newspaper"></i>行业周报</a>
                    <a class="nav-link" href="/email" data-section="info"><i class="bi bi-envelope"></i>邮件推送</a>
                    <span class="nav-section" data-section="smart">智能管理</span>
                    <a class="nav-link" href="/ai-chat" data-section="smart"><i class="bi bi-chat-dots"></i>AI助手</a>
                    <a class="nav-link" href="/text2sql" data-section="smart"><i class="bi bi-robot"></i>智能查询</a>
                    <a class="nav-link" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i>退出登录</a>
                </nav>
            </div>
            <!-- Main Content -->
            <div class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '';
        let currentUser = null;

        function getToken() { return localStorage.getItem('token'); }

        function getHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
        }

        async function apiGet(url) {
            const res = await fetch(url, { headers: getHeaders() });
            if (res.status === 401) { logout(); }
            return res.json();
        }

        async function apiPost(url, data) {
            const res = await fetch(url, { method: 'POST', headers: getHeaders(), body: JSON.stringify(data) });
            if (res.status === 401) { logout(); }
            return res.json();
        }

        async function apiPut(url, data) {
            const res = await fetch(url, { method: 'PUT', headers: getHeaders(), body: JSON.stringify(data) });
            if (res.status === 401) { logout(); }
            return res.json();
        }

        async function apiDelete(url) {
            const res = await fetch(url, { method: 'DELETE', headers: getHeaders() });
            if (res.status === 401) { logout(); }
            return res.json();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        function roleText(role) {
            return {0:'管理员', 1:'普通员工', 2:'经理', 3:'学生'}[role] || '未知';
        }

        function genderText(g) {
            return g === 0 ? '男' : '女';
        }

        function customerStatusText(s) {
            return {0:'未联系', 1:'已联系未回复', 2:'已联系无意向', 3:'已联系有意向', 4:'已入学'}[s] || '未知';
        }

        function customerStatusBadge(s) {
            const colors = {0:'secondary', 1:'warning', 2:'danger', 3:'success', 4:'primary'};
            return `<span class="badge bg-${colors[s]||'secondary'} status-badge">${customerStatusText(s)}</span>`;
        }

        async function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (user) {
                currentUser = user;
                document.getElementById('userInfo').textContent = `${user.name} (${roleText(user.role)})`;
                // Hide menus based on role
                const navLinks = document.querySelectorAll('#sidebarNav .nav-link');
                const hrefs = {
                    '/users': [0],
                    '/customers': [0,1,2,3],
                    '/work-repos': [0,1,2],
                    '/work-repo-sums': [0,2],
                    '/industry-repos': [0,1,2,3],
                    '/email': [0,1,2],
                    '/ai-chat': [0,1,2],
                    '/text2sql': [0,1,2,3]
                };
                const sectionVisible = {};
                navLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    const section = link.getAttribute('data-section');
                    if (hrefs[href] && !hrefs[href].includes(user.role)) {
                        link.style.display = 'none';
                    } else if (section) {
                        sectionVisible[section] = true;
                    }
                });
                // Hide section headers if all items in that section are hidden
                document.querySelectorAll('#sidebarNav .nav-section').forEach(sec => {
                    const section = sec.getAttribute('data-section');
                    if (!sectionVisible[section]) {
                        sec.style.display = 'none';
                    }
                });
            }
        }

        function showToast(msg, type='success') {
            const id = 'toast_' + Date.now();
            const bgColor = type === 'success' ? 'rgba(123,31,162,.9)' : type === 'danger' ? 'rgba(233,30,99,.9)' : type === 'warning' ? 'rgba(255,111,0,.9)' : 'rgba(83,52,131,.9)';
            const html = `<div id="${id}" class="toast align-items-center border-0 show" role="alert" style="position:fixed;top:20px;right:20px;z-index:9999;background:${bgColor};color:#fce4ec;backdrop-filter:blur(10px);border:1px solid rgba(179,157,219,.2);border-radius:10px;">
                <div class="d-flex"><div class="toast-body">${msg}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            setTimeout(() => document.getElementById(id)?.remove(), 3000);
        }

        function formatDate(d) {
            if (!d) return '-';
            return new Date(d).toLocaleString('zh-CN');
        }

        loadUserInfo();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
